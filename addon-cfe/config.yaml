name: "CFE Portal"
description: "Extrae saldo, consumo, fechas y recibo PDF del portal de CFE via MQTT Discovery"
version: "1.2.0"
slug: "addon-cfe"
init: false
arch:
  - aarch64
  - amd64
startup: services
boot: auto
map:
  - share:rw
options:
  cuentas:
    - nombre: "Casa"
      usuario: ""
      password: ""
      num_servicio: ""
  captcha_api_key: ""
  intervalo_horas: 12
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  pdf_dir: "/share/cfe_recibos"
  debug_screenshots: false
schema:
  cuentas:
    - nombre: str
      usuario: str
      password: str
      num_servicio: str?
  captcha_api_key: str
  intervalo_horas: int
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str?
  mqtt_password: str?
  pdf_dir: str?
  debug_screenshots: bool?
